name: pyinstaller-build
on: push
jobs:
  pyinstaller-build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        path: ["gui/", 'gui\']
        exclude:
          - os: ubuntu-latest
            path: 'gui\'
          - os: macos-latest
            path: 'gui\'
          - os: windows-latest
            path: "gui/"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: install dependencies
        run: |
          python -m pip install poetry
          python -m poetry install --with dev

      - name: Create Executable
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: "3.14"
          spec: "build.spec"
          requirements: ""
          upload_exe_with_name: "pyquantsim"
          options: --name "PyQuantSim",
